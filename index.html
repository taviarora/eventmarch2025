<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #f4f4f4;
}

.container {
    text-align: center;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    background-color: white;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

button {
    width: 100%;
    background-color: #5a0404;
    color: white;
    padding: 12px;
    font-size: 16px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 10px;
}

button:hover {
    background-color: #45a049;
}

.message {
    margin-top: 15px;
    font-size: 16px;
}

#loadingSpinner {
    display: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Event Planner</h2>

    <div id="loadingSpinner">Loading...</div>
    <div id="messageArea" class="message"></div>

    <button onclick="AddEventsButton()">Add Event</button>
    <button onclick="ModifytableButton()">Modify Table</button>
    <button onclick="ListData()">List Data</button>
    <button onclick="checkAndSendEmails()">Check Today's Events</button>
</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
function AddEventsButton() {
    window.open('Event-Edit-Final.html');
}

function ModifytableButton() {
    window.open('Event-Table-Edit_1.html');
}

function ListData() {
    window.open('Event-List.html');
}
</script>

<!-- Firebase + Main Logic -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "jwdatabase-f0e20.firebaseapp.com",
    projectId: "jwdatabase-f0e20"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Initialize EmailJS
emailjs.init("qcbXaXrWGMaIRt6_o");

async function checkAndSendEmails() {
    const spinner = document.getElementById('loadingSpinner');
    const msg = document.getElementById('messageArea');

    spinner.style.display = 'block';
    msg.innerHTML = "";

    try {
        const today = new Date().toISOString().split('T')[0];

        const querySnapshot = await getDocs(collection(db, "Event"));

        let found = false;

        querySnapshot.forEach((doc) => {
            const data = doc.data();

            if (data.Date === today) {
                found = true;

                let subject = "";
                let message = "";

                if (data.Occasion === "Birthday") {
                    subject = `Happy Birthday ${data.To_Name}`;
                    message = "Wishing you a wonderful birthday!";
                } 
                
                else if (data.Occasion === "Anniversary") {
                    subject = `Happy Anniversary ${data.To_Name}`;
                    message = "Wishing you a joyful anniversary!";
                }
                else if (data.Occasion === "Reminder-Self") {
                    subject = `Self Reminder ${data.Reminder_Message}`;
                    message = `Self Reminder ${data.Reminder_Message}`;
                }
                else if (data.Occasion === "Reminder") {
                    subject = `"Reminder ${data.To_Name}`;
                    message = "Wishing you a joyful anniversary!";
                }


                else if (data.Occasion === "Reminder-Birthday") {
                    subject = `Reminder-Birthday ${data.To_Name}`;
                    message = 'Birthday Wishes for  ${data.To_Name}';
                }



                     else if (data.Occasion === "Reminder-Anniversary") {
                    subject = `Reminder-Anniversary ${data.To_Name}`;
                    message = 'Anniversary Wishes for  ${data.To_Name}';
                }

                sendEmail(data.To_Email, subject, message, data.To_Gname);
            }
        });

        if (!found) {
            msg.innerHTML = "No events today.";
        } else {
            msg.innerHTML = "Emails sent successfully!";
            msg.style.color = "green";
        }

    } catch (error) {
        console.error(error);
        msg.innerHTML = "Error occurred.";
        msg.style.color = "red";
    }

    spinner.style.display = 'none';
}

function sendEmail(toEmail, subject, message, name) {
    emailjs.send("service_jitwsrj", "template_m0u22pm", {
        to_name: name,
        subject: subject,
        message: message,
        email: toEmail
  
    })
    .then(res => console.log("Email sent", res))
    .catch(err => console.error("Error", err));
}

// Make function global
window.checkAndSendEmails = checkAndSendEmails;

</script>

</body>
</html>
