        async function checkAndSendEmails() {
            const spinner = document.getElementById('loadingSpinner');
            const msg = document.getElementById('messageArea');

            spinner.style.display = 'block';
            msg.innerHTML = "";

            try {
                const today = new Date().toISOString().split('T')[0];

                const querySnapshot = await getDocs(collection(db, "Event"));

                let found = false;
                let sentIds = new Set();
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const key = data.Occasion + "_" + data.To_Email;

                    if (sentIds.has(key)) return;

                    sentIds.add(key);
                    if (data.Date === today) {
                        found = true;

                        let subject = "";
                        let message = "";
                        let link = "";
                        if (data.Occasion === "Birthday") {
                            const RandomBirthdayMessage = BirthdayMessages[Math.floor(Math.random() * BirthdayMessages.length)];
                            const BirthdayRandomLink = BirthdayImageLinks[Math.floor(Math.random() * BirthdayImageLinks.length)];

                            subject = `Happy Birthday ${data.To_Name}`;
                            message = RandomBirthdayMessage;
                            link = BirthdayRandomLink;

                        }

                        else if (data.Occasion === "Anniversary") {
                            const RandomAnniversaryMessage = AnniversaryMessages[Math.floor(Math.random() * AnniversaryMessages.length)];
                            const AnniversaryRandomLink = AnniversaryImageLinks[Math.floor(Math.random() * AnniversaryImageLinks.length)];
                            subject = `Happy Anniversary ${data.To_Name}`;
                            message = RandomAnniversaryMessage;
                            link = AnniversaryRandomLink;
                        }
                        else if (data.Occasion === "Reminder-Self") {
                            subject = `Self Reminder ${data.Reminder_Message}`;
                            message = `Self Reminder ${data.Reminder_Message}`;
                            link = "https://drive.google.com/uc?export=view&id=16APCwvoaWrRNchvFW_PR9z0yVBtCTWwO";
                        }

                        else if (data.Occasion === "Reminder") {
                            subject = `Reminder ${data.To_Name}`;
                            message = "Wishing you a joyful anniversary!";
                            link = "https://drive.google.com/uc?export=view&id=16APCwvoaWrRNchvFW_PR9z0yVBtCTWwO";
                        }

                        else if (data.Occasion === "Reminder-Birthday") {
                            subject = `Reminder-Birthday ${data.To_Name}`;
                            message = `Birthday Wishes for ${data.To_Name}`;
                            link = "https://drive.google.com/uc?export=view&id=16APCwvoaWrRNchvFW_PR9z0yVBtCTWwO";
                        }

                        else if (data.Occasion === "Reminder-Anniversary") {
                            subject = `Reminder-Anniversary ${data.To_Name}`;
                            message = `Anniversary Wishes for ${data.To_Name}`;
                            link = "https://drive.google.com/uc?export=view&id=16APCwvoaWrRNchvFW_PR9z0yVBtCTWwO";
                        }

                        sendEmail(data.To_Email, subject, message, data.To_Gname, link);
                    }
                });

                if (!found) {
                    msg.innerHTML = "No events today.";
                } else {
                    msg.innerHTML = "Emails sent successfully!";
                    msg.style.color = "green";
                }

            } catch (error) {
                console.error(error);
                msg.innerHTML = "Error occurred.";
                msg.style.color = "red";
            }

            spinner.style.display = 'none';
        }


        function sendEmail(toEmail, subject, message, name, link) {
            emailjs.send("service_ql34eml", "template_68lymbm", {
                to_name: name,
                subject: subject,
                message: message,
                email: toEmail,
                link: link
            })
                .then(res => console.log("Email sent", res))
                .catch(err => console.error("Error", err));
        }
